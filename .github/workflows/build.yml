name: Build

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: setup nodejs
      uses: actions/setup-node@v5
      with:
        node-version: 22

    - name: Checkout
      uses: actions/checkout@v5

    - name: install and build vm
      run: |
        cd app
        yarn --frozen-lockfile
        yarn build
        ls

    - uses: actions/upload-artifact@v6
      with:
        name: app
        path: dist/app-1.0.0-ia32-win.zip